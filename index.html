<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeerMetric</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>LeetMetric</h1>

        <div class="user-container">
            <p>Enter your user name below </p>
            <div class="user-input-container">
                <input type="text" placeholder="enter your user name" id="user-input">
                <button id="search-btn">SEARCH</button>
            </div>


        </div>

        <div class="stats-container">

            <div class="progress">
                <div class="progess-item">
                    <div class="easy-progess circle">
                        <span id="easy-label"></span>
                        <p>Easy</p>
                       
                    </div>
                </div>

                <div class="progess-item">
                    <div class="medium-progess circle">
                        <span id="medium-label"></span>
                        <p>Medium</p>
                        
                    </div>
                </div>

                <div class="progess-item">
                    <div class="hard-progess circle">
                        <span id="hard-label"></span>
                        <p>Hard</p>

                       
                    </div>
                </div>


            </div>

            <div class="stats-card">
                
            </div>


        </div>
    </div>


    

    <script src="script.js"></script>
</body>
</html>
